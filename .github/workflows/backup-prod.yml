name: Production DB Backup (encrypted)

on:
  schedule:
    # 每日 03:00 UTC pg_dump production DB,錯開 keep-alive 的 07:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: backup-prod
  cancel-in-progress: false

jobs:
  backup:
    name: Dump + encrypt + upload artifact
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Install PostgreSQL 17 client (PGDG)
        run: |
          set -euo pipefail
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            | sudo gpg --dearmor -o /usr/share/keyrings/pgdg.gpg
          echo "deb [signed-by=/usr/share/keyrings/pgdg.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          # Supabase server 為 PG 17.x;裝 17 client(pg_dump 需 >= server)。
          sudo apt-get install -y postgresql-client-17
          # ⚠️ runner 內建 postgresql-client-16,/usr/bin/pg_dump(pg_wrapper)會選到 16 造成
          # server version mismatch。把 v17 bin 前置到後續步驟 PATH,並在 dump 步驟以絕對路徑呼叫,雙保險。
          echo "/usr/lib/postgresql/17/bin" >> "$GITHUB_PATH"
          /usr/lib/postgresql/17/bin/pg_dump --version  # 必須印出 17.x,否則 set -e 讓步驟紅燈

      - name: Dump (read-only) + encrypt
        env:
          # PROD_DIRECT_URL 必須是 Supabase Session Pooler 字串(pooler host, port 5432)。
          # 勿用 db.<ref>.supabase.co(IPv6-only,runner 連不上);勿用 6543 transaction pooler(pg_dump 不支援)。
          PROD_DIRECT_URL: ${{ secrets.PROD_DIRECT_URL }}
          # 對稱加密 passphrase。遺失 = 所有備份無法還原,務必存密碼管理器。
          BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
          PGCONNECT_TIMEOUT: "15"
          # 絕對路徑呼叫 v17 binary,繞開 runner 內建 pg_wrapper 選到 client 16 的問題。
          PG_BIN: /usr/lib/postgresql/17/bin
        run: |
          set -euo pipefail
          if [ -z "${PROD_DIRECT_URL:-}" ];   then echo "::error::PROD_DIRECT_URL secret is not set"; exit 1; fi
          if [ -z "${BACKUP_PASSPHRASE:-}" ]; then echo "::error::BACKUP_PASSPHRASE secret is not set"; exit 1; fi

          STAMP="$(date -u +%Y%m%d)"
          DUMP="pocketbindr-backup-${STAMP}.dump"

          # server 版本非敏感,記錄以佐證 client >= server;不 echo 連線字串。
          "$PG_BIN/psql" "$PROD_DIRECT_URL" --no-psqlrc -tAc "select version();"

          # 唯讀 dump:只匯出 public schema(全部 app 資料),不含 owner/privilege 便於跨環境還原。
          "$PG_BIN/pg_dump" "$PROD_DIRECT_URL" \
            --format=custom \
            --schema=public \
            --no-owner --no-privileges \
            --file="$DUMP"

          # 加密:passphrase 走 stdin fd(不進 argv/process list)。custom format 已壓縮 → 不再 gzip。
          printf '%s' "$BACKUP_PASSPHRASE" \
            | gpg --batch --yes --symmetric --cipher-algo AES256 --compress-algo none \
                  --passphrase-fd 0 --output "${DUMP}.gpg" "$DUMP"
          rm -f "$DUMP"

          echo "ARTIFACT_NAME=pocketbindr-backup-${STAMP}" >> "$GITHUB_ENV"
          echo "ARTIFACT_FILE=${DUMP}.gpg"                >> "$GITHUB_ENV"
          echo "::notice::backup ready ${DUMP}.gpg ($(du -h "${DUMP}.gpg" | cut -f1))"

      # ── 未來替換點 ──────────────────────────────────────────────
      # 要換 Cloudflare R2:只改下面這一步(改成 rclone / aws s3 cp 到 R2 私有 bucket),
      # 上方 dump+encrypt 完全不動;交接產物固定是 ${ARTIFACT_FILE}(已加密 blob)。
      - name: Upload encrypted artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.ARTIFACT_FILE }}
          retention-days: 30
          if-no-files-found: error

      # 任一前面步驟失敗才觸發;成功路徑零成本。失敗只讓本步驟紅燈,不影響備份本身的成敗判定。
      - name: Notify on failure (Resend)
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${RESEND_API_KEY:-}" ] || [ -z "${ALERT_EMAIL:-}" ]; then
            echo "::warning::RESEND_API_KEY or ALERT_EMAIL not set, skipping failure notification"
            exit 0
          fi
          curl --fail https://api.resend.com/emails \
            -H "Authorization: Bearer ${RESEND_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
                  --arg to "$ALERT_EMAIL" \
                  --arg url "$RUN_URL" \
                  '{from:"PocketBindr <noreply@send.pocketbindr.app>", to:[$to], subject:"[PocketBindr] Production DB backup 失敗", html:("<p>備份 workflow 失敗，請檢查 Actions log：</p><p><a href=\"" + $url + "\">" + $url + "</a></p>")}')"
